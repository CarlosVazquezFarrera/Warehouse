<main class="inventory-container">
  <app-product-filters (filtersHasChanged)="filtersHasChanged($event)" />
  <section class="header-table">
    <button mat-mini-fab color="primary" aria-label="Add supply" matTooltip="Create an order" (click)="createOrder()">
      <mat-icon>local_shipping</mat-icon>
    </button>
  </section>
  @if (store.productsHaveData()) {

  <div class="mat-elevation-z8">
    <div class="content">
      <table class="primary" mat-table [dataSource]="store.pagedProducts.data()">
        <ng-container matColumnDef="name" sticky>
          <th mat-header-cell *matHeaderCellDef> Name </th>
          <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="supplierPart">
          <th mat-header-cell *matHeaderCellDef> Supplier Part </th>
          <td mat-cell *matCellDef="let element"> {{element.supplierPart}} </td>
        </ng-container>
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef> Category </th>
          <td mat-cell *matCellDef="let element"> {{element.categoryName}} </td>
        </ng-container>
        <ng-container matColumnDef="productFormat">
          <th mat-header-cell *matHeaderCellDef> ProductFormat </th>
          <td mat-cell *matCellDef="let element"> {{element.productFormatName}} </td>
        </ng-container>
        <ng-container matColumnDef="packagingType">
          <th mat-header-cell *matHeaderCellDef> PackagingType </th>
          <td mat-cell *matCellDef="let element"> {{element.packagingTypeName}} </td>
        </ng-container>
        <ng-container matColumnDef="completeStock">
          <th mat-header-cell *matHeaderCellDef> Complete Stock </th>
          <td mat-cell *matCellDef="let element"> {{element | completeStock }} </td>
        </ng-container>
        <ng-container matColumnDef="stock" stickyEnd>
          <th mat-header-cell *matHeaderCellDef> Stock </th>
          <td mat-cell *matCellDef="let element"> {{element.stock}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="productClicked(row.id)"></tr>
      </table>
    </div>
    <mat-paginator [length]="store.pagedProducts.totalCount()" [pageSize]="store.productsPageSize()"
      (page)="handlePageEvent($event)" showFirstLastButtons aria-label="Select page of periodic elements">
    </mat-paginator>
  </div>
  }
  @else{
  <app-no-data />
  }

</main>
